<!DOCTYPE html>
<html>
<head>
    <title>File & Web Server Demo</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2ecc71);
            color: white;
        }

        h1 {
            text-align: center;
            padding: 30px;
            font-size: 2.5rem;
            animation: fadeDown 1s ease;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .card {
            width: 400px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            transition: 0.3s;
            animation: fadeUp 1s ease;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
        }

        .card h2 {
            margin-bottom: 15px;
        }

        .file {
            background: rgba(255,255,255,0.08);
            padding: 12px;
            border-radius: 10px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .file:hover {
            background: rgba(46, 204, 113, 0.3);
        }

        button {
            background: #2ecc71;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #27ae60;
            transform: scale(1.1);
        }

        #preview {
            margin-top: 20px;
            text-align: center;
        }

        img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 10px;
            animation: fadeIn 0.5s ease;
        }

        iframe {
            border-radius: 10px;
            animation: fadeIn 0.5s ease;
        }

        /* ANIMATIONS */
        @keyframes fadeDown {
            from {opacity:0; transform: translateY(-20px);}
            to {opacity:1; transform: translateY(0);}
        }

        @keyframes fadeUp {
            from {opacity:0; transform: translateY(20px);}
            to {opacity:1; transform: translateY(0);}
        }

        @keyframes fadeIn {
            from {opacity:0;}
            to {opacity:1;}
        }

    </style>

</head>

<body>

    <h1>🌐 File Server & Web Server Integration</h1>

    <div class="container">

        <!-- FILE SERVER -->
        <div class="card">
            <h2>📁 File Server (Google Drive)</h2>

            <p>Files are stored externally and accessed via links.</p>

            <div class="file">
                <span>🖼 Image File</span>
                <button onclick="showImage()">Open</button>
            </div>

            <div class="file">
                <span>📄 Text File</span>
                <button onclick="showText()">Open</button>
            </div>
        </div>

        <!-- WEB SERVER -->
        <div class="card">
            <h2>🖥 Web Server Output</h2>

            <div id="preview">
                <p>Click a file to preview here</p>
            </div>
        </div>

    </div>

    <script>
    function showImage() {
        document.getElementById("preview").innerHTML =
            '<img src="https://drive.google.com/uc?export=view&id=1gEunEL9_6lbt9AMu0FDkftrud0N0WYfw">';
    }

    function showText() {
        document.getElementById("preview").innerHTML =
            '<iframe src="https://drive.google.com/file/d/14BwGjXRsigay4hS_PQdtInRQk7ASka1Z/preview" width="100%" height="300"></iframe>';
    }

    // AUTO LOAD IMAGE PAG OPEN NG PAGE
    window.onload = function() {
        showImage();
    }
</script>

</body>
</html>
